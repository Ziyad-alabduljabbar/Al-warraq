{% extends "base.html" %}
{% block title %}Register | الوراق | Al warraq{% endblock %}

{% block content %}
<form method="post" class="auth-form">
  <h2>Create your الوراق | Al warraq account</h2>

  <label for="email">Email Address</label>
  <input id="email" type="email" name="email" placeholder="you@example.com" required />

  <label for="password">Password</label>
  <input id="password" type="password" name="password" placeholder="Create a secure password" required />

  <label for="confirm_password">Confirm Password</label>
  <input id="confirm_password" type="password" name="confirm_password" placeholder="Repeat your password" required />

  <button type="submit" class="button-primary" style="width:100%;">Register</button>
  <p style="margin-top:1rem;text-align:center;">
    Already have an account?
    <a href="{{ url_for('login') }}" style="color: var(--primary-brown); font-weight:600;">Log in</a>
  </p>
</form>
{% endblock %}
